<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DYSON ARRAY // INTERSTELLAR MODE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="space"></div>
<div id="canvas-container"></div>

<!-- HUD MINIMAL -->
<div id="hud">

    <div class="top">
        <div>DYSON TYPE-II SIMULATION</div>
        <div id="status">STANDBY</div>
    </div>

    <div class="center">
        <h1 id="title">INITIALISATION</h1>
        <p id="desc">Connexion gravitationnelle...</p>

        <div class="stats">
            <span id="temp-val">273K</span>
            <span id="energy-val">0YW</span>
            <span id="progress-percent">0%</span>
        </div>

        <button id="btn">ACTIVER</button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
