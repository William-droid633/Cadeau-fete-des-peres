<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYSON_SPHÄRE // KRAFTWERK SYSTEMS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="crt-lines"></div>
    <div class="vignette"></div>

    <div id="canvas-container"></div>

    <div id="hud-layer">
        <div class="frame-border"></div>

        <header class="hud-header">
            <div class="brand">KRAFTWERK_ELEKTRONIK</div>
            <div class="system-title">DYSON_STEURUNG_v4.26</div>
        </header>

        <div class="telemetry left">
            <div class="data-block">
                <span class="label">KERN_TEMP (Fusion Core)</span>
                <span class="value" id="temp-val">273.15 K</span>
            </div>
            <div class="data-block">
                <span class="label">ENERGY_OUTPUT</span>
                <span class="value" id="energy-val">0.00 GW</span>
            </div>
            <div class="data-block">
                <span class="label">MATRIC_STATUS</span>
                <span class="value" style="color: #ff0055;">STANDBY</span>
            </div>
        </div>

        <div class="telemetry right">
            <div class="data-block text-right">
                <span class="label">PROGRAMM</span>
                <span class="value">MENSCH_MASCHINE</span>
            </div>
            <div class="data-block text-right">
                <span class="label">AUDIO_SYNTH</span>
                <span class="value">BOING_BOUM_TCHAK</span>
            </div>
        </div>

        <main class="core-control">
            <div class="warning-light"></div>
            <h1 class="main-headline" id="main-title">REAKTOR_BEREIT</h1>
            <p class="status-msg" id="status-desc">ATTENTION : L'initialisation va canaliser 100% de l'énergie stellaire.</p>
            
            <button class="launch-btn" id="launch-trigger">
                <span class="btn-glow"></span>
                <span class="btn-text">ZÜNDUNG (INITIALISER LA SPHÈRE)</span>
            </button>
        </main>

        <footer class="hud-footer">
            <span>SYSTEM_PAPA_2026 // DIE ROBOTER</span>
            <span id="progress-percent">00%</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
